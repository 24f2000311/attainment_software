{% extends "base.html" %}

{% block content %}
<div class="max-w-xl mx-auto text-center pt-10">
    <div class="inline-flex items-center justify-center h-20 w-20 rounded-full bg-emerald-100 mb-6">
        <svg class="h-10 w-10 text-emerald-600" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7" />
        </svg>
    </div>
    
    <h2 class="text-2xl font-bold text-slate-900 mb-2">Success!</h2>
    <p class="text-slate-600 mb-8">{{ message }}</p>

    <a href="/cqi_summary" class="inline-flex items-center px-6 py-3 border border-transparent text-base font-medium rounded-lg shadow-sm text-white bg-primary-600 hover:bg-primary-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-primary-500 transition-colors">
        View CQI Summary
        <svg xmlns="http://www.w3.org/2000/svg" class="ml-2 -mr-1 h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 7l5 5m0 0l-5 5m5-5H6" />
        </svg>
    </a>
</div>
{% endblock %}
