{% extends "base.html" %}
{% block content %}

<div class="max-w-xl mx-auto text-center pt-10">
    <div class="inline-flex items-center justify-center h-20 w-20 rounded-full bg-red-100 mb-6">
        <svg class="h-10 w-10 text-red-600" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z" />
        </svg>
    </div>
    
    <h2 class="text-2xl font-bold text-slate-900 mb-2">Something Went Wrong</h2>
    
    <div class="bg-red-50 border border-red-200 rounded-lg p-4 mb-8 text-left">
        <p class="text-red-800 font-medium">Error Details:</p>
        <p class="text-red-700 mt-1">{{ error_message }}</p>
    </div>

    <a href="/" class="inline-flex items-center px-6 py-3 border border-slate-300 shadow-sm text-base font-medium rounded-lg text-slate-700 bg-white hover:bg-slate-50 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-primary-500 transition-colors">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 mr-2 -ml-1" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18" />
        </svg>
        Go Back Home
    </a>
</div>

{% endblock %}
