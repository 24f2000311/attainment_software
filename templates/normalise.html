<div class="bg-white rounded-xl shadow-sm border border-slate-200 overflow-hidden">
    <table class="min-w-full divide-y divide-slate-200">
        <thead class="bg-slate-50">
            <tr>
                <th scope="col" class="px-6 py-3 text-left text-xs font-semibold text-slate-500 uppercase tracking-wider">Student</th>
                <th scope="col" class="px-6 py-3 text-left text-xs font-semibold text-slate-500 uppercase tracking-wider">Assessment</th>
                <th scope="col" class="px-6 py-3 text-left text-xs font-semibold text-slate-500 uppercase tracking-wider">CO</th>
                <th scope="col" class="px-6 py-3 text-left text-xs font-semibold text-slate-500 uppercase tracking-wider">Marks</th>
            </tr>
        </thead>
        <tbody class="bg-white divide-y divide-slate-200">
        {% for row in data %}
            <tr class="hover:bg-slate-50 transition-colors">
                <td class="px-6 py-4 whitespace-nowrap text-sm text-slate-900">{{ row.Student_ID }}</td>
                <td class="px-6 py-4 whitespace-nowrap text-sm text-slate-600">{{ row.Assessment }}</td>
                <td class="px-6 py-4 whitespace-nowrap text-sm text-slate-600">{{ row.CO }}</td>
                <td class="px-6 py-4 whitespace-nowrap text-sm text-slate-600">{{ row.Marks }}</td>
            </tr>
        {% endfor %}
        </tbody>
    </table>
</div>
