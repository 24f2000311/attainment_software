{% extends "base.html" %}

{% block content %}
<div class="max-w-3xl mx-auto text-center">
    <div class="mb-10">
        <div class="inline-flex items-center justify-center h-16 w-16 rounded-full bg-indigo-100 mb-6">
            <svg class="h-8 w-8 text-indigo-600" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 17v-2m3 2v-4m3 4v-6m2 10H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z" />
            </svg>
        </div>
        <h2 class="text-3xl font-bold text-slate-900">Report Generation</h2>
        <p class="text-slate-500 mt-2 text-lg">Your analysis is complete. Select a format to download your report.</p>
    </div>

    <div class="bg-white rounded-xl shadow-sm border border-slate-200 p-8">
        <form method="post" class="grid md:grid-cols-2 gap-6">
            
            <button name="report_type" value="excel" class="group relative flex flex-col items-center justify-center p-6 border-2 border-emerald-100 rounded-xl hover:bg-emerald-50 hover:border-emerald-200 transition-all duration-200">
                <div class="h-12 w-12 bg-emerald-100 rounded-full flex items-center justify-center mb-4 group-hover:scale-110 transition-transform">
                    <svg class="h-6 w-6 text-emerald-600" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 17v-2m3 2v-4m3 4v-6m2 10H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z" />
                    </svg>
                </div>
                <span class="text-lg font-semibold text-slate-900">Excel Report</span>
                <span class="text-sm text-slate-500 mt-1">Detailed data & calculations</span>
            </button>

            <button name="report_type" value="pdf" class="group relative flex flex-col items-center justify-center p-6 border-2 border-red-100 rounded-xl hover:bg-red-50 hover:border-red-200 transition-all duration-200">
                <div class="h-12 w-12 bg-red-100 rounded-full flex items-center justify-center mb-4 group-hover:scale-110 transition-transform">
                    <svg class="h-6 w-6 text-red-600" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 21h10a2 2 0 002-2V9.414a1 1 0 00-.293-.707l-5.414-5.414A1 1 0 0012.586 3H7a2 2 0 00-2 2v14a2 2 0 002 2z" />
                    </svg>
                </div>
                <span class="text-lg font-semibold text-slate-900">PDF Report</span>
                <span class="text-sm text-slate-500 mt-1">Print-ready summary</span>
            </button>

        </form>
    </div>

    <div class="mt-8 flex justify-between items-center">
        <a href="/cqi_summary" class="text-sm font-medium text-slate-600 hover:text-slate-900 flex items-center transition-colors">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4 mr-1" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7" />
            </svg>
            Back to CQI Summary
        </a>
<a href="/"
   class="inline-flex items-center gap-2 px-6 py-3
   bg-gradient-to-r from-sky-500 to-blue-600
   hover:from-sky-600 hover:to-blue-700
   text-black font-semibold text-sm
   rounded-xl
   shadow-md hover:shadow-lg
   transition-all duration-300 ease-in-out
   hover:-translate-y-0.5
   focus:outline-none focus:ring-2 focus:ring-sky-400 focus:ring-offset-2">

    <svg xmlns="http://www.w3.org/2000/svg"
         class="w-5 h-5"
         fill="none"
         viewBox="0 0 24 24"
         stroke="currentColor">
        <path stroke-linecap="round"
              stroke-linejoin="round"
              stroke-width="2"
              d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15" />
    </svg>

    <span>Start Over</span>
</a>
    </div>
</div>
{% endblock %}
