{% extends "base.html" %}

{% block content %}
<div class="flex items-center justify-center min-h-[60vh]">
    <div class="bg-white p-8 rounded-xl shadow-lg border border-slate-100 max-w-md w-full">
        
        <div class="text-center mb-8">
            <div class="w-16 h-16 bg-gradient-to-br from-indigo-500 to-purple-500 rounded-full flex items-center justify-center mx-auto mb-4 shadow-md">
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="w-8 h-8 text-white">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M16.5 10.5V6.75a4.5 4.5 0 10-9 0v3.75m-.75 11.25h10.5a2.25 2.25 0 002.25-2.25v-6.75a2.25 2.25 0 00-2.25-2.25H6.75a2.25 2.25 0 00-2.25 2.25v6.75a2.25 2.25 0 002.25 2.25z" />
                </svg>
            </div>
            
            <h2 class="text-2xl font-bold text-slate-800">Activate Software</h2>
            <p class="text-slate-500 mt-2">Please enter your product key to continue using the Attainment Software System.</p>
        </div>

        <form method="POST" action="{{ url_for('activation_bp.activate') }}" class="space-y-6">
            <div>
                <label for="product_key" class="block text-sm font-medium text-slate-700 mb-1">Product Key</label>
                <input 
                    type="text" 
                    id="product_key" 
                    name="product_key" 
                    placeholder="AAAA-BBBB-CCCC-DDDD"
                    class="w-full px-4 py-3 rounded-lg border border-slate-300 focus:border-indigo-500 focus:ring-4 focus:ring-indigo-500/10 transition outline-none font-mono text-center uppercase tracking-widest"
                    required
                >
            </div>

            <button type="submit" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-semibold py-3 px-4 rounded-lg shadow-md hover:shadow-lg transition-all transform hover:-translate-y-0.5">
                Activate License
            </button>
        </form>
        
        <div class="mt-6 text-center text-xs text-slate-400">
            Need a key? Contact the administrator.
        </div>
    </div>
</div>
{% endblock %}
